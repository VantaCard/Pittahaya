<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Pittahaya — OG card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      width: 1200px;
      height: 630px;
      background: #050507;
      color: #fff;
      font-family: "Manrope", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ambient luxury gradients */
    .ambient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(900px 480px at 22% 24%, rgba(232, 52, 135, 0.14), transparent 62%),
        radial-gradient(720px 420px at 82% 78%, rgba(230, 191, 116, 0.10), transparent 60%),
        radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.40) 100%);
      pointer-events: none;
    }

    /* Fine grid texture */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 88px 88px;
      pointer-events: none;
    }

    /* Vignette */
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 38px;
      padding: 0 80px;
    }

    /* Top hairline accent */
    .top-line {
      position: absolute;
      top: 46px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e6bf74 50%, transparent);
      opacity: 0.55;
    }

    /* Bottom hairline */
    .bottom-line {
      position: absolute;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232, 52, 135, 0.65) 50%, transparent);
      opacity: 0.55;
    }

    /* Tiny ecuador tag top */
    .meta-top {
      position: absolute;
      top: 64px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Manrope", sans-serif;
      font-weight: 500;
      font-size: 11.5px;
      letter-spacing: 0.42em;
      color: rgba(230, 191, 116, 0.62);
      text-transform: uppercase;
    }

    .logo {
      width: 168px;
      height: 168px;
      filter: drop-shadow(0 28px 60px rgba(232, 52, 135, 0.30));
      object-fit: contain;
    }

    .wordmark {
      font-family: "Cormorant Garamond", "Times New Roman", serif;
      font-weight: 500;
      font-size: 108px;
      line-height: 1;
      letter-spacing: 0.035em;
      color: #f6efe2;
      margin: 0;
      text-shadow: 0 8px 60px rgba(230, 191, 116, 0.12);
    }

    .tagline {
      font-family: "Manrope", sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.48em;
      color: rgba(246, 239, 226, 0.58);
      text-transform: uppercase;
      margin-top: -6px;
    }

    /* Bottom meta */
    .meta-bottom {
      position: absolute;
      bottom: 64px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: "Manrope", sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 0.34em;
      color: rgba(246, 239, 226, 0.52);
      text-transform: uppercase;
    }

    .meta-bottom .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #e6bf74;
      box-shadow: 0 0 12px rgba(230, 191, 116, 0.6);
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="grid"></div>
  <div class="vignette"></div>

  <span class="top-line"></span>
  <span class="meta-top">Diseño Web Premium</span>

  <div class="card">
    <img class="logo" src="assets/pitahaya-logo.png" alt="Pittahaya" />
    <h1 class="wordmark">Pittahaya</h1>
    <p class="tagline">Ecuador</p>
  </div>

  <div class="meta-bottom">
    <span>pittahaya.com</span>
    <span class="dot"></span>
    <span>Estudio</span>
  </div>
  <span class="bottom-line"></span>
</body>
</html>
